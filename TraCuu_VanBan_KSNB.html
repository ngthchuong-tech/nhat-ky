function bd(s){if(!s)return"";return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[đĐ]/g,"d")}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function hl(txt,ws){
  if(!ws||!ws.length)return esc(txt);
  let t=esc(txt),b=bd(txt);
  [...ws].sort((a,c)=>c.length-a.length).forEach(w=>{
    let i=0,res="";
    while(i<b.length){const x=b.indexOf(w,i);if(x<0){res+=t.slice(i);break;}res+=t.slice(i,x)+"<mark>"+t.slice(x,x+w.length)+"</mark>";i=x+w.length;}
    t=res;b=bd(t.replace(/<[^>]+>/g,""));
  });
  return t;
}

function rFilters(){
  const cnts={};DATA.forEach(d=>cnts[d.lv]=(cnts[d.lv]||0)+1);
  let h='<span class="chip'+(actLV===""?" on":"'")+'" style="'+(actLV===""?'background:#1F4E78;color:#fff':'')+'" data-lv="">Tất cả ('+DATA.length+')</span>';
  Object.entries(LV).forEach(([lv,c])=>{
    if(!cnts[lv])return;
    h+='<span class="chip'+(actLV===lv?" on":"'")+'" style="'+(actLV===lv?'background:'+c.bc+';color:#fff':'')+'" data-lv="'+lv+'">'+lv+' · '+cnts[lv]+'</span>';
  });
  document.getElementById("filters").innerHTML='<label>Lĩnh vực:</label>'+h;
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{actLV=c.dataset.lv;go();rFilters();});
}
function rList(){
  const q=document.getElementById("q").value.trim();
  const ws=bd(q).split(/s+/).filter(w=>w.length>=2);
  document.getElementById("stats").textContent="Hiển thị "+Math.min(fil.length,100)+" / "+fil.length+" văn bản"+(fil.length>100?" (thu hẹp từ khóa để xem chính xác hơn)":"");
  if(!fil.length){document.getElementById("list").innerHTML='<div class="empty">🔍 Không tìm thấy kết quả<br><small>Thử từ khóa khác hoặc bỏ bộ lọc lĩnh vực</small></div>';return;}
  document.getElementById("list").innerHTML=fil.slice(0,100).map(d=>{
    const lv=LV[d.lv]||{bg:"#eee",c:"#333",bc:"#999",lb:d.lv};
    const title=d.noi_dung||d.so_hieu||"";
    const meta=[d.so_hieu,d.ngay_ky,lv.lb].filter(Boolean).join(" · ");
    return'<div class="card" style="border-left-color:'+lv.bc+'">'+
      '<span class="badge" style="background:'+lv.bg+';color:'+lv.c+'">'+d.lv+'</span>'+
      '<div class="cb">'+
        '<div class="ct">'+(ws.length?hl(title,ws):esc(title))+'</div>'+
        '<div class="cm"><span>'+esc(meta)+'</span>'+
          (d.link?'<a class="btn" href="'+esc(d.link)+'" target="_blank">📂 Mở file</a>':'<span>—</span>')+
        '</div>'+
      '</div>'+
    '</div>';
  }).join("");
}
function go(){
  const q=document.getElementById("q").value.trim();
  const ws=bd(q).split(/s+/).filter(w=>w.length>=2);
  fil=DATA.filter(d=>{
    if(actLV&&d.lv!==actLV)return false;
    if(!q)return true;
    return ws.every(w=>d.search.includes(w));
  });
  rList();
}
document.getElementById("q").addEventListener("input",go);
rFilters();rList();
</script>
</body>
</html>
