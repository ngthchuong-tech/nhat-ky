<head>

<title>Tra cứu văn bản KSNB — Cảng Đồng Nai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a1a1a}

/* ── LAYOUT TỔNG ── */
.app{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.hd{background:#1F4E78;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.hd h1{font-size:15px;font-weight:600;white-space:nowrap}
.hd small{font-size:11px;opacity:.7;white-space:nowrap}

/* ── BODY: 2 CỘT ── */
.body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── CỘT TRÁI: TÌM KIẾM ── */
.left{display:flex;flex-direction:column;width:400px;min-width:320px;max-width:480px;border-right:1px solid #dde;flex-shrink:0;background:#fff}
.sb{padding:10px 12px;border-bottom:1px solid #dde;flex-shrink:0}
.sb input{width:100%;height:38px;font-size:14px;padding:0 12px;border:2px solid #2E75B6;border-radius:8px;outline:none;color:#1a1a1a;background:#fff}
.sb input:focus{border-color:#1F4E78;box-shadow:0 0 0 3px rgba(31,78,120,.1)}
.flt{padding:6px 12px;border-bottom:1px solid #dde;display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0;background:#fafafa}
.flt label{font-size:11px;color:#888;margin-right:2px;flex-shrink:0}
.chip{padding:3px 9px;border-radius:20px;border:1px solid #ddd;font-size:11px;cursor:pointer;background:#fff;color:#555;transition:all .12s;user-select:none;white-space:nowrap}
.chip:hover{border-color:#1F4E78;color:#1F4E78}
.chip.on{color:#fff;border-color:transparent;font-weight:500}
.stats{padding:5px 12px;font-size:11px;color:#999;flex-shrink:0;background:#fafafa;border-bottom:1px solid #eee}
.list{flex:1;overflow-y:auto;padding:6px}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}

/* ── CARD KẾT QUẢ ── */
.card{padding:9px 12px;border-radius:8px;cursor:pointer;display:flex;gap:8px;align-items:flex-start;border-left:3px solid #ccc;margin-bottom:5px;transition:background .12s;background:#fff;border:1px solid #eee;border-left-width:3px}
.card:hover{background:#f5f8ff;border-color:#B5D4F4;border-left-color:inherit}
.card.active{background:#EBF3FB;border-color:#2E75B6;border-left-color:inherit}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:1px;white-space:nowrap}
.cb{min-width:0}
.ct{font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.4;margin-bottom:3px;word-break:break-word}
.cm{font-size:11px;color:#888;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ext-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;background:#EBF3FB;color:#185FA5;font-size:11px;text-decoration:none;border:1px solid #B5D4F4;transition:all .12s;white-space:nowrap}
.ext-btn:hover{background:#185FA5;color:#fff}
mark{background:#fff3cd;border-radius:2px;padding:0 2px}
.empty{text-align:center;padding:40px 16px;color:#bbb;font-size:13px}

/* ── CỘT PHẢI: XEM PDF ── */
.right{flex:1;display:flex;flex-direction:column;min-width:0;background:#e8edf2}
.right-hd{padding:8px 16px;background:#fff;border-bottom:1px solid #dde;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:44px}
.right-title{font-size:13px;font-weight:500;color:#1a1a1a;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.right-ext{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;background:#1F4E78;color:#fff;font-size:12px;text-decoration:none;flex-shrink:0;transition:opacity .15s}
.right-ext:hover{opacity:.85}
.right-body{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.placeholder{text-align:center;color:#aaa;font-size:14px;padding:40px}
.placeholder svg{display:block;margin:0 auto 16px;opacity:.3}
.pdf-frame{width:100%;height:100%;border:none;display:block}

/* ── RESIZER ── */
.resizer{width:4px;cursor:col-resize;background:#e0e5ea;flex-shrink:0;transition:background .15s}
.resizer:hover,.resizer.dragging{background:#2E75B6}
</style>
</head>

let fil=[...DATA],actLV="",activeIdx=-1;

function rF(){
  const cn={};DATA.forEach(d=>cn[d.lv]=(cn[d.lv]||0)+1);
  let h='<label>Lĩnh vực:</label><span class="chip'+(actLV===""?" on":"")+'" style="'+(actLV===""?"background:#1F4E78;color:#fff":"")+'" data-lv="">Tất cả ('+DATA.length+')</span>';
  ["A1","A2","A3","A4","A5","A6","A7","A8","A9"].forEach(lv=>{
    if(!cn[lv])return;
    const c=LV[lv];
    h+='<span class="chip'+(actLV===lv?" on":"")+'" style="'+(actLV===lv?"background:"+c.bc+";color:#fff":"")+'" data-lv="'+lv+'">'+lv+' · '+cn[lv]+'</span>';
  });
  document.getElementById("flt").innerHTML=h;
}

function openDoc(d,cardEl){
  document.querySelectorAll(".card.active").forEach(c=>c.classList.remove("active"));
  if(cardEl)cardEl.classList.add("active");
  document.getElementById("rt").textContent=d.noi_dung||d.so_hieu||"(không có trích yếu)";
  const rl=document.getElementById("rlink");
  rl.href=d.link;rl.style.display="inline-flex";
  const rb=document.getElementById("rbody");
  if(d.link){
    // Chuyển link Drive thành /preview để nhúng được vào iframe
    const fileId=d.link.match(/\/d\/([^/]+)/);
    if(fileId){
      const previewUrl="https://drive.google.com/file/d/"+fileId[1]+"/preview";
      rb.innerHTML='<iframe class="pdf-frame" src="'+previewUrl+'" allow="autoplay" loading="lazy"></iframe>';
    } else {
      rb.innerHTML='<div class="placeholder">Không thể xem trực tiếp — <a href="'+esc(d.link)+'" target="_blank" style="color:#185FA5">mở trong Drive</a></div>';
    }
  } else {
    rb.innerHTML='<div class="placeholder">Không có link cho văn bản này</div>';
  }
}

function rL(){
  const q=document.getElementById("q").value.trim();
  const ws=bd(q).split(/\s+/).filter(w=>w.length>=2);
  const n=Math.min(fil.length,150);
  document.getElementById("stats").textContent="Hiển thị "+n+" / "+fil.length+" văn bản"+(fil.length>150?" — thu hẹp từ khóa":"");
  if(!fil.length){
    document.getElementById("list").innerHTML='<div class="empty">Không tìm thấy kết quả<br><small>Thử từ khóa khác</small></div>';
    return;
  }
  document.getElementById("list").innerHTML=fil.slice(0,150).map((d,i)=>{
    const lv=LV[d.lv]||{bg:"#eee",c:"#555",bc:"#999",lb:d.lv||"?"};
    const title=d.noi_dung||d.so_hieu||"(không có trích yếu)";
    const meta=[d.so_hieu,d.ngay_ky].filter(Boolean).join(" · ");
    return'<div class="card" style="border-left-color:'+lv.bc+'" data-i="'+i+'" onclick="openDoc(fil['+i+'],this)">'+
      '<span class="badge" style="background:'+lv.bg+';color:'+lv.c+'">'+d.lv+'</span>'+
      '<div class="cb">'+
        '<div class="ct">'+(ws.length?hl(title,ws):esc(title))+'</div>'+
        '<div class="cm">'+
          '<span>'+esc(meta)+'</span>'+
          (d.link?'<a class="ext-btn" href="'+esc(d.link)+'" target="_blank" onclick="event.stopPropagation()">↗</a>':'')+ 
        '</div>'+
      '</div>'+
    '</div>';
  }).join("");
}

function go(){
  const q=document.getElementById("q").value.trim();
  const ws=bd(q).split(/\s+/).filter(w=>w.length>=2);
  fil=DATA.filter(d=>{
    if(actLV&&d.lv!==actLV)return false;
    if(!q)return true;
    return ws.every(w=>d.search.includes(w));
  });
  rL();
}

document.getElementById("q").addEventListener("input",go);
document.getElementById("flt").addEventListener("click",function(e){
  const chip=e.target.closest(".chip");
  if(!chip)return;
  actLV=chip.dataset.lv||"";
  go();rF();
});

// Resizer drag
const resizer=document.getElementById("resizer");
const leftEl=document.getElementById("left");
let dragging=false,startX=0,startW=0;
resizer.addEventListener("mousedown",function(e){
  dragging=true;startX=e.clientX;startW=leftEl.offsetWidth;
  resizer.classList.add("dragging");
  document.body.style.cursor="col-resize";
  document.body.style.userSelect="none";
});
document.addEventListener("mousemove",function(e){
  if(!dragging)return;
  const w=Math.min(Math.max(startW+(e.clientX-startX),240),700);
  leftEl.style.width=w+"px";
});
document.addEventListener("mouseup",function(){
  if(!dragging)return;
  dragging=false;resizer.classList.remove("dragging");
  document.body.style.cursor="";document.body.style.userSelect="";
});

rF();rL();
</script>
