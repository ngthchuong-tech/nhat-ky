àng","boPhan":"Điều độ bến/Bảo vệ","trungTam":{"yeuCau":"Chủ hàng/đơn vị vận chuyển gửi danh sách xe trước; Điều độ chuyển cho bảo vệ cổng theo dõi","cauHoi":"Bảo vệ cổng có đối chiếu xe thực tế vào/ra với danh sách đăng ký không? Có trường hợp xe ngoài danh sách được vào nhận hàng không?","bangChung":"Sổ/nhật ký ra vào cổng của bảo vệ","ruiRo":"Xe ngoài danh sách vẫn được vào — dấu hiệu thiếu kiểm soát, có thể liên quan ưu ái điều phối phương tiện"},"phaiSinh":[{"loai":"Đầu ra","cauHoi":"Trường hợp phát hiện xe không có trong danh sách, bảo vệ cổng xử lý như thế nào — từ chối hay báo cáo xin ý kiến? Có ghi nhận lại để theo dõi không?"}]},{"nhomCauHoi":"QA111-B11-1","maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp","buoc":"B11","tenBuoc":"Triển khai làm hàng","boPhan":"Điều độ bến/Cơ giới","trungTam":{"yeuCau":"Điều động phương tiện đồng bộ, liên tục không gián đoạn; đảm bảo an toàn","cauHoi":"Việc điều động thiết bị làm hàng có đảm bảo liên tục, đúng tiến độ không? Có ghi nhận thời gian gián đoạn (nếu có) và nguyên nhân không?","bangChung":"Nhật ký làm hàng, biên bản gián đoạn (nếu có)","ruiRo":"Gián đoạn làm hàng không rõ nguyên nhân/không ghi nhận, ảnh hưởng năng suất"},"phaiSinh":[{"loai":"Đầu vào","cauHoi":"Trước khi triển khai làm hàng, có xác nhận tất cả phương tiện/thiết bị đã sẵn sàng (không có sự cố tiềm ẩn) không?"},{"loai":"Đầu ra","cauHoi":"Các lần gián đoạn làm hàng có được tổng hợp định kỳ để phân tích nguyên nhân gốc rễ (thiết bị, nhân sự, khách hàng...) không?"}]},{"nhomCauHoi":"QA111-B12-1","maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp","buoc":"B12","tenBuoc":"Giao nhận hàng hóa","boPhan":"Điều độ bến/Chủ hàng","trungTam":{"yeuCau":"Đại diện KH giao nhận, xuất phiếu xuất hàng cho từng xe; nếu hư hỏng phải dừng làm hàng, lập biên bản hiện trường","cauHoi":"Phiếu xuất hàng cho từng xe có được lập đầy đủ, khớp với số lượng xe thực tế qua cổng không?","bangChung":"Phiếu xuất hàng từng xe, đối chiếu với nhật ký cổng","ruiRo":"Phiếu xuất hàng không khớp số xe thực tế qua cổng"},"phaiSinh":[{"loai":"Đầu vào","cauHoi":"Phiếu xuất hàng do khách hàng lập theo mẫu riêng — Cảng có đối chiếu mẫu này với thực tế xếp dỡ trước khi chuyển cho Điều độ bến không?"}]},{"nhomCauHoi":"QA111-B12-2","maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp","buoc":"B12","tenBuoc":"Giao nhận hàng hóa","boPhan":"Điều độ bến/Chủ hàng","trungTam":{"yeuCau":"Đại diện KH giao nhận, xuất phiếu xuất hàng cho từng xe; nếu hư hỏng phải dừng làm hàng, lập biên bản hiện trường","cauHoi":"Nếu có phát sinh hư hỏng/đổ vỡ hàng hóa, có lập biên bản hiện trường với đầy đủ chữ ký các bên (khách hàng, tàu, cảng) không?","bangChung":"Biên bản hiện trường hàng hư hỏng","ruiRo":"Không lập biên bản khi có hư hỏng — khó xác định trách nhiệm bồi thường"},"phaiSinh":[{"loai":"Đầu ra","cauHoi":"Biên bản hiện trường hàng hư hỏng có được chuyển cho bộ phận nào để xử lý bồi thường/khiếu nại? Thời gian xử lý trung bình là bao lâu?"}]},{"nhomCauHoi":"QA111-B13-1","maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp","buoc":"B13","tenBuoc":"Hoàn thành thủ tục tàu xuất bến","boPhan":"Điều độ bến/Thống kê","trungTam":{"yeuCau":"Lập bảng kết toán sản lượng, giấy xác báo thời gian tàu tại cảng (MA111/05), chuyển kế toán áp giá","cauHoi":"Bảng kết toán sản lượng hàng hóa với chủ hàng có khớp với các chứng từ giao nhận (phiếu xuất hàng, MA111/05) không?","bangChung":"Bảng kết toán sản lượng, MA111/05, phiếu xuất hàng","ruiRo":"Kết toán sản lượng không khớp chứng từ gốc"},"phaiSinh":[{"loai":"Đầu vào","cauHoi":"Bảng kết toán sản lượng được tổng hợp từ những chứng từ gốc nào? Có đối chiếu chéo giữa Điều độ bến và bộ phận Thống kê trước khi chốt số liệu không?"}]},{"nhomCauHoi":"QA111-B13-2","maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp","buoc":"B13","tenBuoc":"Hoàn thành thủ tục tàu xuất bến","boPhan":"Điều độ bến/Thống kê","trungTam":{"yeuCau":"Lập bảng kết toán sản lượng, giấy xác báo thời gian tàu tại cảng (MA111/05), chuyển kế toán áp giá","cauHoi":"Giấy xác báo thời gian tàu tại cảng (MA111/05) có được chuyển kịp thời cho Kế toán để áp giá tính phí không?","bangChung":"MA111/05, chứng từ chuyển giao cho Kế toán (có ký nhận, ngày chuyển)","ruiRo":"Chuyển chứng từ chậm cho kế toán, làm trễ thu phí"},"phaiSinh":[{"loai":"Đầu ra","cauHoi":"Có quy định thời hạn cụ thể (bao nhiêu ngày sau khi tàu rời) phải chuyển đủ chứng từ cho Kế toán không? Thực tế có trường hợp chậm trễ không, nguyên nhân?"}]},{"nhomCauHoi":"QA111-B14-1","maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp","buoc":"B14","tenBuoc":"Tàu rời cầu","boPhan":"Điều độ bến","trungTam":{"yeuCau":"Tàu/đại lý hoàn tất giấy phép rời cảng, thanh toán phí cầu bến trước khi rời; tra thủy triều, kiểm tra vùng nước trước khi rời","cauHoi":"Tàu/đại lý đã thanh toán đầy đủ phí cầu bến và các dịch vụ trước khi rời cầu chưa? Có trường hợp cho tàu rời khi chưa thanh toán không?","bangChung":"Chứng từ thanh toán phí cầu bến/dịch vụ","ruiRo":"Cho tàu rời khi chưa thanh toán đầy đủ — thất thu"},"phaiSinh":[{"loai":"Đầu vào","cauHoi":"Trường hợp khách hàng nợ phí cầu bến từ các lần trước, có được xem xét trước khi chấp nhận cho tàu hiện tại rời cầu không?"},{"loai":"Đầu ra","cauHoi":"Có cơ chế đối chiếu công nợ định kỳ với phòng Tài vụ để đảm bảo không có tàu nào rời cầu khi còn nợ phí không?"}]},{"nhomCauHoi":"QA111-B14-2","maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp","buoc":"B14","tenBuoc":"Tàu rời cầu","boPhan":"Điều độ bến","trungTam":{"yeuCau":"Tàu/đại lý hoàn tất giấy phép rời cảng, thanh toán phí cầu bến trước khi rời; tra thủy triều, kiểm tra vùng nước trước khi rời","cauHoi":"Giấy phép rời cảng do Cảng vụ cấp có được xuất trình/lưu hồ sơ không?","bangChung":"Giấy phép rời cảng (Cảng vụ)","ruiRo":"Thiếu hồ sơ giấy phép rời cảng"},"phaiSinh":[{"loai":"Đầu ra","cauHoi":"Giấy phép rời cảng có được lưu trữ đầy đủ, đối chiếu số lượng tàu rời với số giấy phép lưu trữ để phát hiện thiếu sót không?"}]}];
const DANH_SACH_QT = [{"maQT":"QA111","tenQT":"Xếp dỡ hàng tổng hợp"}];
const LS_SEL = 'ksnb_cauhoi_selected';
let selected = JSON.parse(localStorage.getItem(LS_SEL) || '[]');
let actQT = "";

function bd(s){if(!s)return"";return s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[đĐ]/g,"d")}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function rFilters(){
  let h = '<span class="chip'+(actQT===""?" on":"")+'" data-qt="">Tất cả ('+DATA.length+')</span>';
  DANH_SACH_QT.forEach(qt=>{
    const cnt = DATA.filter(d=>d.maQT===qt.maQT).length;
    h += '<span class="chip'+(actQT===qt.maQT?" on":"")+'" data-qt="'+esc(qt.maQT)+'" title="'+esc(qt.tenQT)+'">'+esc(qt.maQT)+' ('+cnt+')</span>';
  });
  document.getElementById("filtersQT").innerHTML = '<label>Quy trình</label>'+h;
  document.querySelectorAll("#filtersQT .chip").forEach(c=>c.onclick=()=>{actQT=c.dataset.qt;go();});
}

function go(){
  const q = document.getElementById("q").value.trim();
  const ws = bd(q).split(/\s+/).filter(w=>w.length>=2);
  let fil = DATA.filter(d=>{
    if(actQT && d.maQT!==actQT) return false;
    if(!ws.length) return true;
    const t = d.trungTam||{};
    const haystack = bd([d.maQT,d.tenQT,d.tenBuoc,d.boPhan,t.yeuCau,t.cauHoi,t.bangChung,t.ruiRo,
      ...(d.phaiSinh||[]).map(p=>p.cauHoi)].join(" "));
    return ws.every(w=>haystack.includes(w));
  });
  document.getElementById("stats").textContent = "Tìm thấy "+fil.length+" cụm câu hỏi";
  rList(fil);
  rFilters();
}

function rList(groups){
  const el = document.getElementById("list");
  if(!groups.length){ el.innerHTML='<div class="empty">Không có kết quả phù hợp.</div>'; return; }
  el.innerHTML = groups.map((g,gi)=>{
    const t = g.trungTam||{};
    const uidC = g.nhomCauHoi+"_c";
    const checkedC = selected.some(s=>s.uid===uidC);
    const nD = (g.phaiSinh||[]).length;
    const dHtml = (g.phaiSinh||[]).map((d,di)=>{
      const uid = g.nhomCauHoi+"_d"+di;
      const checked = selected.some(s=>s.uid===uid);
      const cls = d.loai==="Đầu vào"?"dv":d.loai==="Thực hiện"?"th":"dr";
      return '<div class="derived-item '+cls+'"><span class="dtag">'+esc(d.loai)+'</span>'+
        '<label class="chk"><input type="checkbox" data-uid="'+uid+'" '+(checked?"checked":"")+
        ' onchange="toggleSelect(\''+g.nhomCauHoi+'\',\'d\','+di+',this)">'+esc(d.cauHoi)+'</label></div>';
    }).join("");
    return '<div class="card">'+
      '<div class="tag-row"><span class="tag qt">'+esc(g.maQT)+'</span><span class="tag buoc">'+esc(g.buoc)+'</span></div>'+
      '<div class="ten-buoc">'+esc(g.tenBuoc)+'</div>'+
      '<div class="bo-phan">Bộ phận chịu trách nhiệm: '+esc(g.boPhan)+'</div>'+
      '<div class="field"><b>Câu hỏi kiểm tra:</b> '+esc(t.cauHoi)+'</div>'+
      '<div class="field"><b>Bằng chứng/hồ sơ cần yêu cầu:</b> '+esc(t.bangChung)+'</div>'+
      (t.ruiRo?'<div class="field rui-ro"><b>⚠ Dấu hiệu rủi ro:</b> '+esc(t.ruiRo)+'</div>':'')+
      '<label class="chk"><input type="checkbox" data-uid="'+uidC+'" '+(checkedC?"checked":"")+
      ' onchange="toggleSelect(\''+g.nhomCauHoi+'\',\'c\',null,this)">Thêm vào danh sách buổi làm việc</label>'+
      (nD>0?'<button class="expand-btn" onclick="toggleExpand(this)">▸ Xem '+nD+' câu hỏi phái sinh (trước/trong/sau)</button><div class="derived-box">'+dHtml+'</div>':'')+
    '</div>';
  }).join("");
}

function toggleExpand(btn){
  const box = btn.nextElementSibling;
  const opening = !box.classList.contains("open");
  box.classList.toggle("open");
  btn.textContent = btn.textContent.replace(opening?"▸":"▾", opening?"▾":"▸");
}

function toggleSelect(nhom, kind, di, el){
  const g = DATA.find(x=>x.nhomCauHoi===nhom);
  const uid = el.dataset.uid;
  if(el.checked){
    if(!selected.some(s=>s.uid===uid)){
      if(kind==="c"){
        const t = g.trungTam||{};
        selected.push({uid,maQT:g.maQT,buoc:g.buoc,tenBuoc:g.tenBuoc,loai:"Trung tâm",cauHoi:t.cauHoi,bangChung:t.bangChung,ruiRo:t.ruiRo});
      } else {
        const d = g.phaiSinh[di];
        selected.push({uid,maQT:g.maQT,buoc:g.buoc,tenBuoc:g.tenBuoc,loai:"Phái sinh - "+d.loai,cauHoi:d.cauHoi,bangChung:"",ruiRo:""});
      }
    }
  } else { selected = selected.filter(s=>s.uid!==uid); }
  localStorage.setItem(LS_SEL, JSON.stringify(selected));
  rSelected();
}

function rSelected(){
  const el = document.getElementById("selected-list");
  if(!selected.length){ el.innerHTML='<p style="color:#aab;font-size:12px">Chưa chọn câu hỏi nào.</p>'; return; }
  el.innerHTML = selected.map(s=>
    '<div class="sel-item"><div><b>'+esc(s.maQT)+' / '+esc(s.buoc)+'</b>'+
    (s.loai!=="Trung tâm"?' <i>('+esc(s.loai)+')</i>':'')+' — '+esc(s.cauHoi)+'</div>'+
    '<button onclick="removeSel(\''+s.uid+'\')">Xóa</button></div>'
  ).join("");
}

function removeSel(uid){
  selected = selected.filter(s=>s.uid!==uid);
  localStorage.setItem(LS_SEL, JSON.stringify(selected));
  rSelected();
  document.querySelectorAll('input[data-uid="'+uid+'"]').forEach(cb=>cb.checked=false);
}

function clearList(){
  if(!confirm("Xóa toàn bộ danh sách đã chọn?")) return;
  selected = [];
  localStorage.setItem(LS_SEL, JSON.stringify(selected));
  rSelected();
  document.querySelectorAll('input[type=checkbox][data-uid]').forEach(cb=>cb.checked=false);
}

function copyList(){
  if(!selected.length){ alert("Chưa có câu hỏi nào được chọn."); return; }
  let text = "DANH SÁCH CÂU HỎI KIỂM TRA\n" + "=".repeat(40) + "\n\n";
  selected.forEach((s,i)=>{
    text += (i+1)+". ["+s.maQT+" / "+s.buoc+"] "+s.tenBuoc+"\n";
    text += "   Câu hỏi: "+s.cauHoi+"\n";
    if(s.bangChung) text += "   Bằng chứng cần yêu cầu: "+s.bangChung+"\n";
    if(s.ruiRo) text += "   Lưu ý rủi ro: "+s.ruiRo+"\n";
    text += "\n";
  });
  navigator.clipboard.writeText(text).then(()=>alert("Đã sao chép vào clipboard."));
}

document.getElementById("q").addEventListener("input", go);
rFilters(); rSelected(); go();
</script>
</body>
</html>
